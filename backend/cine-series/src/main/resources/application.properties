# ------------------------------
# DATASOURCE / MYSQL
# ------------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------------------
# JPA / HIBERNATE
# ------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ------------------------------
# CONFIGURACIONES OPCIONALES
# ------------------------------
# Evitar problemas de TimeZone
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Logging de SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT
jwt.secret=change-me-with-a-very-long-secret-key-please-change
jwt.expiration-ms=3600000

# CORS (Angular dev)
app.cors.allowed-origins=http://localhost:4200

# Admin defaults (para DataInitConfig)
app.admin.username=${APP_ADMIN_USERNAME}
app.admin.password=${APP_ADMIN_PASSWORD}
app.admin.role=ROLE_ADMIN
