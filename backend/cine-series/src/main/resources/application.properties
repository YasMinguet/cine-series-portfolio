# ------------------------------
# DATASOURCE / MYSQL
# ------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/serie_portfolio?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=portfolio_user
spring.datasource.password=akira
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------------------
# JPA / HIBERNATE
# ------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ------------------------------
# CONFIGURACIONES OPCIONALES
# ------------------------------
# Evitar problemas de TimeZone
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Logging de SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
