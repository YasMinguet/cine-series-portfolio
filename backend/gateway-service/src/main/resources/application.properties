server.port=8080
spring.application.name=gateway-service

eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/

# API Routes
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[2].id=series-service
spring.cloud.gateway.routes[2].uri=lb://series-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/series/**

spring.cloud.gateway.routes[3].id=rating-service
spring.cloud.gateway.routes[3].uri=lb://rating-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/ratings/**

# OpenAPI proxy routes for aggregated Swagger
spring.cloud.gateway.routes[4].id=openapi-user
spring.cloud.gateway.routes[4].uri=lb://user-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/user-service/v3/api-docs
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/user-service/v3/api-docs, /v3/api-docs

spring.cloud.gateway.routes[5].id=openapi-series
spring.cloud.gateway.routes[5].uri=lb://series-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/series-service/v3/api-docs
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/series-service/v3/api-docs, /v3/api-docs

spring.cloud.gateway.routes[6].id=openapi-rating
spring.cloud.gateway.routes[6].uri=lb://rating-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/rating-service/v3/api-docs
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/rating-service/v3/api-docs, /v3/api-docs

# Swagger UI aggregation
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.urls[0].name=User Service
springdoc.swagger-ui.urls[0].url=/user-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=Series Service
springdoc.swagger-ui.urls[1].url=/series-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Rating Service
springdoc.swagger-ui.urls[2].url=/rating-service/v3/api-docs
